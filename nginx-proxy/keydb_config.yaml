# Connection settings
connection:
  connect_timeout: 100   # Connect timeout in milliseconds  
  send_timeout: 1000     # Send timeout in milliseconds
  read_timeout: 1000     # Read timeout in milliseconds

# Connection pooling settings
keepalive:
  pool_size: 10          # Maximum number of connections in pool
  max_idle_timeout: 10000 # Maximum idle time in milliseconds
  
# Cache settings
cache:
  default_ttl: 3600      # Default TTL in seconds
  max_ttl: 86400         # Maximum TTL in seconds 